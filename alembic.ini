# CloudMind AI — Alembic Configuration
# Generated for: SQLite → PostgreSQL migration support
#
# To initialize Alembic in the backend directory:
#   cd backend && alembic init alembic
#   alembic revision --autogenerate -m "initial_schema"
#   alembic upgrade head
#
# For PostgreSQL production migration:
#   Set DATABASE_URL env var, then run:
#   alembic upgrade head

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Log level for alembic output
# Use 'debug' for SQL echoing during development
log_level = WARNING

# Database URL — prefer env variable for production
# SQLite is the default; swap for PostgreSQL in production
sqlalchemy.url = sqlite:///./backend/cloudmind.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
