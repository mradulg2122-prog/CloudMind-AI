# =============================================================================
# CloudMind AI — docker-compose.yml  (v5 — Production Grade)
#
# Services:
#   backend   : FastAPI + uvicorn on port 8000
#   frontend  : Next.js on port 3000
#   nginx     : Reverse proxy on ports 80/443 (uncomment for production)
#
# Quick start (development):
#   docker-compose up --build
#
# Production:
#   docker-compose up -d --build
#
# Env vars: copy .env.example → .env and fill in secrets
# =============================================================================

version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context    : .
      dockerfile : Dockerfile
      target     : runtime
    image          : cloudmind-backend:latest
    container_name : cloudmind_backend
    restart        : unless-stopped
    ports:
      - "8000:8000"
    environment:
      - CLOUDMIND_SECRET_KEY=${CLOUDMIND_SECRET_KEY:-CHANGE-IN-PRODUCTION-USE-256BIT-RANDOM-KEY}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/backend/cloudmind.db}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:80}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - cloudmind_db:/app/backend            # persist SQLite database
      - cloudmind_logs:/app/logs             # persist structured logs
      - cloudmind_models:/app/backend/model_backups  # persist model versions
    healthcheck:
      test         : ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval     : 30s
      timeout      : 10s
      start_period : 25s
      retries      : 3
    networks:
      - cloudmind_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context    : ./frontend
      dockerfile : Dockerfile.frontend
    image          : cloudmind-frontend:latest
    container_name : cloudmind_frontend
    restart        : unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://cloudmind-ai.onrender.com}
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cloudmind_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  # Uncomment for production deployments with TLS termination
  # nginx:
  #   image          : nginx:1.25-alpine
  #   container_name : cloudmind_nginx
  #   restart        : unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     backend:
  #       condition: service_healthy
  #     frontend:
  #       condition: service_healthy
  #   networks:
  #     - cloudmind_net

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  cloudmind_db:
    driver: local
  cloudmind_logs:
    driver: local
  cloudmind_models:
    driver: local

# ── Internal Network ──────────────────────────────────────────────────────────
networks:
  cloudmind_net:
    driver: bridge
